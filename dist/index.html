<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blacklist</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #111827;
        --muted: #4b5563;
        --border: #d1d5db;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #050505;
          --fg: #f5f5f5;
          --muted: #a3a3a3;
          --border: #3a3a3a;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        background: var(--bg);
        color: var(--fg);
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
      }

      main {
        max-width: 680px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 48px;
        line-height: 1.1;
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.6;
      }

      a {
        display: inline-block;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 18px;
        color: inherit;
        text-decoration: none;
      }

      a:hover {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Blacklist</h1>
      <p>
        A simple Manifest V3 Chrome extension for blocking distracting websites
        with a small unlist countdown.
      </p>
      <a href="https://github.com/lgg/Blacklist">View source on GitHub</a>
    </main>
  </body>
</html>
